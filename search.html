<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>도서 검색 — chipbook</title>
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/search.css">
</head>
<body>
  <header id="header"></header>

  <main class="page-wrapper">
    <section class="search-hero">
      <div class="inner search-hero__inner">
        <div class="search-hero__text">
          <h1 class="search-hero__title">원하는 책을 태그로 검색해 보세요</h1>
          <p class="search-hero__desc">여러 태그를 입력하면 더 정확한 도서를 찾을 수 있어요.</p>
          <div class="search-bar">
            <svg class="search-bar__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input type="text" class="search-bar__input" id="searchInput" placeholder="검색어를 입력하세요">
            <button class="search-bar__clear" id="searchClear" style="display:none">✕</button>
            <button class="search-bar__btn" id="searchBtn">검색</button>
          </div>
          <!-- 선택된 태그 -->
          <div class="selected-tags" id="selectedTagsArea" style="display:none">
            <span class="selected-tags__label">선택된 태그</span>
            <div class="selected-tags__list" id="selectedTagsList"></div>
            <button class="selected-tags__clear" id="clearAllTags">전체 지우기</button>
          </div>
          <div class="all-tags" id="allTagsArea">
            <span class="all-tags__label">태그 선택</span>
            <div class="all-tags__list" id="allTagsList"></div>
          </div>
        </div>
        <div class="search-hero__visual">🌿</div>
      </div>
    </section>

    <section class="search-results">
      <div class="inner">
        <!-- 결과 헤더 -->
        <div class="results-header" id="resultsHeader">
          <span class="results-count" id="resultsCount"></span>
          <div class="results-controls">
            <select class="results-sort" id="resultsSort">
              <option value="recommended">추천순</option>
              <option value="latest">최신순</option>
              <option value="price_low">낮은 가격순</option>
              <option value="rating">별점순</option>
            </select>
            <div class="view-toggle">
              <button class="view-btn active" id="viewGrid" title="카드형">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
              </button>
              <button class="view-btn" id="viewList" title="리스트형">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
              </button>
            </div>
          </div>
        </div>

        <!-- 결과 목록 -->
        <div id="searchResultsContainer"></div>
      </div>
    </section>
  </main>

  <footer id="footer"></footer>

  
  
  <script type="module" src="js/search.js"></script>
</body>
</html>
